<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프롬프트 마법사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#09080f;min-height:100vh;display:flex;justify-content:center;padding:40px 16px;font-family:'Noto Sans KR',sans-serif}.ww{background:#0e0c14;border-radius:20px;width:100%;max-width:640px;overflow:hidden;border:1px solid rgba(255,255,255,0.07);height:fit-content}.hero{background:radial-gradient(ellipse 60% 70% at 50% 10%,#2a1f4a 0%,#0e0c14 70%);padding:28px 24px 24px;text-align:center;position:relative}.htitle{font-size:48px;font-weight:900;color:#fff;line-height:1.0;letter-spacing:-1px;margin-bottom:10px}.htitle span{background:linear-gradient(135deg,#c4b5fd,#f0abfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.hsub{font-size:13px;color:rgba(255,255,255,0.45);line-height:1.7;max-width:300px;margin:0 auto}.free-badge{display:inline-flex;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);border-radius:20px;padding:3px 10px;font-size:11px;color:#6ee7b7;margin-top:10px}.body{padding:0 20px 28px}.slbl{font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:8px;margin-top:20px}.txta{width:100%;min-height:110px;resize:vertical;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px 16px;font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.75;color:rgba(255,255,255,0.85);outline:none;margin-bottom:10px}.txta::placeholder{color:rgba(255,255,255,0.22)}.txta:focus{border-color:rgba(139,92,246,0.5)}.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}.chip{font-size:12px;color:rgba(255,255,255,0.45);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:5px 12px;cursor:pointer}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}.obox{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:13px 12px}.otitle{font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:9px}.ogrp{display:flex;flex-direction:column;gap:5px}.obtn{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:8px;font-size:12px;color:rgba(255,255,255,0.5);background:transparent;border:1px solid transparent;cursor:pointer;font-family:'Noto Sans KR',sans-serif;text-align:left;width:100%}.obtn.on{background:rgba(124,58,237,0.2);border-color:rgba(139,92,246,0.45);color:#c4b5fd}.mbtn{width:100%;padding:15px;background:linear-gradient(90deg,#7c3aed,#c026d3,#f43f5e);border:none;border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 4px 24px rgba(124,58,237,0.35);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px}.mbtn:disabled{opacity:0.45;cursor:not-allowed}.fnote{text-align:center;font-size:11px;color:rgba(255,255,255,0.18);margin-top:6px}.rdiv{display:flex;align-items:center;gap:10px;margin:22px 0 18px;font-size:11px;color:rgba(255,255,255,0.25)}.rdiv::before,.rdiv::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08)}.rhide{display:none}.rshow{display:block}.icard{background:rgba(124,58,237,0.1);border:1px solid rgba(139,92,246,0.25);border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;gap:10px}.itag{font-size:10px;font-weight:700;color:#a78bfa;white-space:nowrap}.ibody{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.55}.ocard{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:14px;overflow:hidden;margin-bottom:12px}.ochead{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.07)}.octit{display:flex;align-items:center;gap:7px;font-size:11px;color:rgba(255,255,255,0.4)}.odot{width:7px;height:7px;border-radius:50%;background:#a78bfa}.cpbtn{font-size:11px;color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}.obody{padding:14px;font-size:14px;line-height:1.8;color:rgba(255,255,255,0.8);white-space:pre-wrap;word-break:break-word}.ilbl{font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:8px}.iitem{display:flex;gap:9px;padding:9px 11px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;margin-bottom:6px}.itagi{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;flex-shrink:0;background:rgba(124,58,237,0.2);color:#c4b5fd;border:1px solid rgba(139,92,246,0.3)}.idesc{font-size:12px;color:rgba(255,255,255,0.45);line-height:1.55}.tcard{background:rgba(240,171,252,0.07);border:1px solid rgba(240,171,252,0.2);border-radius:12px;padding:12px 14px;margin-top:4px}.tlbl{font-size:10px;font-weight:700;color:#f0abfc;margin-bottom:4px}.tbody{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.6}.rbtn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;margin-top:14px;padding:10px;font-size:13px;color:rgba(255,255,255,0.3);background:transparent;border:1px solid rgba(255,255,255,0.08);border-radius:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}.ldbox{text-align:center;padding:2.5rem 0;display:none}.ldbox.on{display:block}.spin{width:36px;height:36px;margin:0 auto 14px;border:2px solid rgba(139,92,246,0.2);border-top-color:#a78bfa;border-right-color:#c026d3;border-radius:50%;animation:spin 0.7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.ltxt{font-size:13px;color:rgba(255,255,255,0.35)}.ebox{font-size:13px;color:#fca5a5;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:10px;padding:10px 14px;margin-top:10px;display:none}.ebox.on{display:block}
</style>
</head>
<body>
<div class="ww">
  <div class="hero">
    <div class="htitle">프롬프트<br><span>마법사</span></div>
    <p class="hsub">막연한 생각을 AI가 완벽하게 이해하는<br>최적화된 프롬프트로 변환해 드립니다</p>
    <div class="free-badge">완전 무료 · 로그인 불필요 · 누구나 사용 가능</div>
  </div>
  <div class="body">
    <div class="slbl">내가 원하는 것을 자유롭게 입력하세요</div>
    <textarea class="txta" id="ri" placeholder="예) 이력서 써줘, 영어 공부하는 방법 알려줘, 파이썬 배우고 싶어..."></textarea>
    <div class="chips" id="chips"><span class="chip">블로그 글 쓰기</span><span class="chip">살 빼는 방법 알아봐</span><span class="chip">엑셀 어떻게 배워</span><span class="chip">발표 잘하는 법</span><span class="chip">이직 고민이야</span></div>
    <div class="grid3">
      <div class="obox"><div class="otitle">답변 스타일</div><div class="ogrp" id="sg"><button class="obtn on" data-v="친근하게">😊 친근하게</button><button class="obtn" data-v="전문적으로">💼 전문적으로</button><button class="obtn" data-v="간결하게">⚡ 간결하게</button></div></div>
      <div class="obox"><div class="otitle">답변 길이</div><div class="ogrp" id="lg"><button class="obtn" data-v="단문">📌 단문</button><button class="obtn on" data-v="보통">📄 보통</button><button class="obtn" data-v="상세">📚 상세</button></div></div>
      <div class="obox"><div class="otitle">내 수준</div><div class="ogrp" id="vg"><button class="obtn on" data-v="입문">🌱 입문</button><button class="obtn" data-v="중급">🔥 중급</button><button class="obtn" data-v="고급">🚀 고급</button></div></div>
    </div>
    <button class="mbtn" id="mb">✦ 프롬프트 최적화하기</button>
    <p class="fnote">Powered by Groq · 완전 무료 · Prompt Wizard 2026</p>
    <div class="ebox" id="eb"></div>
    <div class="ldbox" id="lb"><div class="spin"></div><p class="ltxt">마법을 부리는 중... 잠시만요 ✨</p></div>
    <div id="rb" class="rhide">
      <div class="rdiv">✦ 변환 결과</div>
      <div class="icard"><div class="itag">파악된 의도</div><div class="ibody" id="it"></div></div>
      <div class="ocard"><div class="ochead"><div class="octit"><div class="odot"></div>최적화된 프롬프트</div><button class="cpbtn" id="cb">복사</button></div><div class="obody" id="ob"></div></div>
      <div class="ilbl">개선된 점</div><div id="il"></div>
      <div class="tcard"><div class="tlbl">💡 초보자 팁</div><div class="tbody" id="tb"></div></div>
      <button class="rbtn" id="rstb">← 다시 시도하기</button>
    </div>
  </div>
</div>
<script>
var _a='gsk_A9cUAWbzu2DF24nU',_b='QQVqWGdyb3FYmElk4Eb',_c='JvjnYGQgkvp2K71IH';
var K=_a+_b+_c;
var U='https://api.groq.com/openai/v1/chat/completions';
var S='당신은 프롬프트 엔지니어링 전문가입니다. 사용자 요청을 최적화된 프롬프트로 변환하세요. JSON만 응답(마크다운 없이): {"intent":"의도요약","optimized_prompt":"최적화된프롬프트","improvements":[{"tag":"유형","desc":"설명"}],"tip":"팁"} 개선항목 2-4개.';
var ss='친근하게',sl='보통',sv='입문';
['sg','lg','vg'].forEach(function(id,i){document.getElementById(id).addEventListener('click',function(e){var b=e.target.closest('.obtn');if(!b)return;document.querySelectorAll('#'+id+' .obtn').forEach(function(x){x.classList.remove('on');});b.classList.add('on');[function(v){ss=v;},function(v){sl=v;},function(v){sv=v;}][i](b.dataset.v);});});
document.getElementById('chips').addEventListener('click',function(e){if(e.target.classList.contains('chip'))document.getElementById('ri').value=e.target.textContent;});
document.getElementById('cb').addEventListener('click',function(){navigator.clipboard.writeText(document.getElementById('ob').textContent).then(function(){var b=document.getElementById('cb');b.textContent='복사됨 ✓';setTimeout(function(){b.textContent='복사';},2000);});});
document.getElementById('rstb').addEventListener('click',function(){document.getElementById('rb').className='rhide';document.getElementById('ri').value='';document.getElementById('eb').classList.remove('on');});
document.getElementById('mb').addEventListener('click',async function(){
var raw=document.getElementById('ri').value.trim();
if(!raw){document.getElementById('ri').focus();return;}
var eb=document.getElementById('eb');eb.classList.remove('on');document.getElementById('rb').className='rhide';document.getElementById('lb').classList.add('on');document.getElementById('mb').disabled=true;
try{
var res=await fetch(U,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+K},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:S},{role:'user',content:'[스타일:'+ss+'][길이:'+sl+'][수준:'+sv+']\n'+raw}],max_tokens:1500,response_format:{type:'json_object'}})});
if(!res.ok)throw new Error('오류 '+res.status);
var data=await res.json();
var p=JSON.parse(data.choices[0].message.content);
document.getElementById('it').textContent=p.intent||'';document.getElementById('ob').textContent=p.optimized_prompt||'';document.getElementById('tb').textContent=p.tip||'';
var il=document.getElementById('il');il.innerHTML='';(p.improvements||[]).forEach(function(imp){var el=document.createElement('div');el.className='iitem';el.innerHTML='<span class="itagi">'+imp.tag+'</span><span class="idesc">'+imp.desc+'</span>';il.appendChild(el);});
document.getElementById('lb').classList.remove('on');document.getElementById('rb').className='rshow';
}catch(err){document.getElementById('lb').classList.remove('on');eb.textContent='오류: '+(err.message||'다시 시도해주세요.');eb.classList.add('on');}
finally{document.getElementById('mb').disabled=false;}
});
</script>
</body>
</html>
